services:
  - type: web
    name: pramanik-drishti-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_PATH
        value: /var/data/pramanik.db
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: pramanik-drishti-web
          envVarKey: RENDER_EXTERNAL_HOSTNAME
    disk:
      name: pramanik-drishti-data
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: pramanik-drishti-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: pramanik-drishti-api
          envVarKey: RENDER_EXTERNAL_HOSTNAME
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
